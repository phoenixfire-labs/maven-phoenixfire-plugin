name: Build

# Full test + coverage gate for PRs (require as a branch protection check). Pushes to main
# only run publish-snapshot.yml (deploy, no tests).
on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 17 is the compile/runtime baseline; 21 guards forward compatibility.
        java: [ '17', '21' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build, unit test, and run integration tests
        env:
          PHOENIXFIRE_GIT_SHA: ${{ github.sha }}
          PHOENIXFIRE_GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: >
          mvn -B -ntp clean verify install -Prun-its -Pcoverage
          -Dphoenixfire.git.sha=$PHOENIXFIRE_GIT_SHA
          -Dphoenixfire.git.branch=$PHOENIXFIRE_GIT_BRANCH
          -Dphoenixfire.ci.provider=github
          -Dphoenixfire.ci.buildId=${{ github.run_id }}
          -Dphoenixfire.ci.buildUrl=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Upload JaCoCo coverage report
        if: matrix.java == '17'
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-aggregate-jdk17
          path: phoenixfire-coverage/target/site/jacoco-aggregate/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk${{ matrix.java }}
          path: |
            **/target/surefire-reports/**
            **/target/phoenixfire-reports/**
            **/target/it/**/build.log
            **/target/it/**/target/phoenixfire-reports/**
          if-no-files-found: ignore
          retention-days: 14
