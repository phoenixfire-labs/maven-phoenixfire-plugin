name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 17 is the compile/runtime baseline; 21 guards forward compatibility.
        java: [ '17', '21' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the run-envelope git fallback can resolve the commit/branch.
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build, unit test, and run integration tests
        run: mvn -B -ntp clean install -Prun-its

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk${{ matrix.java }}
          path: |
            **/target/surefire-reports/**
            **/target/phoenixfire-reports/**
            **/target/it/**/build.log
            **/target/it/**/target/phoenixfire-reports/**
          if-no-files-found: ignore
          retention-days: 14
