name: Publish to Maven Central

# Same triggers as GitHub Packages release; deploys io.github.phoenixfire-labs:* to Central.
on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without v prefix (e.g. 0.1.0)'
        required: true

permissions:
  contents: read

concurrency:
  group: publish-central-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-central:
    name: Deploy to Maven Central
    runs-on: ubuntu-latest

    steps:
      - name: Require Maven Central and GPG secrets
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          missing=""
          for s in CENTRAL_USERNAME CENTRAL_PASSWORD GPG_PRIVATE_KEY GPG_PASSPHRASE; do
            eval "v=\$$s"
            if [ -z "$v" ]; then
              missing="$missing $s"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing repository secrets:$missing"
            echo "See docs/MAVEN-CENTRAL.md for one-time setup."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "Could not resolve release version from tag" >&2
            exit 1
          fi
          if [[ "$VERSION" == *SNAPSHOT* ]]; then
            echo "Maven Central release version must not be a SNAPSHOT: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing to Maven Central: $VERSION"

      - name: Set up JDK 17 and GPG
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}
          server-id: central
          server-username: ${{ secrets.CENTRAL_USERNAME }}
          server-password: ${{ secrets.CENTRAL_PASSWORD }}

      - name: Set Maven version from release tag
        run: mvn -B -ntp versions:set-property -Dproperty=revision -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false

      - name: Build, sign, and publish to Central
        run: mvn -B -ntp clean deploy -Pcentral -Dmaven.test.skip=true -Djacoco.skip=true
