name: Publish to GitHub Packages

# Create a GitHub Release (tag vX.Y.Z) → CI deploys that version, then bumps main to the next SNAPSHOT.
on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without v prefix (e.g. 0.1.0)'
        required: true

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Deploy to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "Could not resolve release version from tag" >&2
            exit 1
          fi
          if [[ "$VERSION" == *SNAPSHOT* ]]; then
            echo "Release version must not be a SNAPSHOT: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: github
          server-username: ${{ github.actor }}
          server-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Maven version from release tag
        run: mvn -B -ntp versions:set-property -Dproperty=revision -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false

      - name: Build, test, and deploy
        run: mvn -B -ntp clean deploy -Prun-its

  bump-snapshot:
    name: Bump main to next SNAPSHOT
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compute next SNAPSHOT revision
        id: next
        shell: bash
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          IFS='.' read -r major minor patch <<< "$VERSION"
          patch="${patch%%[^0-9]*}"
          if [ -z "$major" ] || [ -z "$minor" ] || [ -z "$patch" ]; then
            echo "Could not parse release version: $VERSION" >&2
            exit 1
          fi
          NEXT="${major}.${minor}.$((patch + 1))-SNAPSHOT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next development revision: $NEXT (after $VERSION)"

      - name: Update revision on main
        run: mvn -B -ntp versions:set-property -Dproperty=revision -DnewVersion=${{ steps.next.outputs.next }} -DgenerateBackupPoms=false

      - name: Commit and push
        run: |
          if git diff --quiet pom.xml; then
            echo "pom.xml already at ${{ steps.next.outputs.next }}, nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "chore: bump revision to ${{ steps.next.outputs.next }} after v${{ needs.publish.outputs.version }} release"
          git push origin main
