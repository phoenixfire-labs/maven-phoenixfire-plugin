name: Publish SNAPSHOT to GitHub Packages

# Deploy the current <revision> from main (must end in -SNAPSHOT) for integration testing.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-snapshot-main
  cancel-in-progress: true

jobs:
  publish-snapshot:
    name: Deploy SNAPSHOT
    runs-on: ubuntu-latest

    steps:
      - name: Require PACKAGES_PUBLISH_TOKEN
        run: |
          if [ -z "${{ secrets.PACKAGES_PUBLISH_TOKEN }}" ]; then
            echo "::error::Repository secret PACKAGES_PUBLISH_TOKEN is required."
            echo "Create a classic PAT with write:packages (and read:packages), add it under"
            echo "Settings → Secrets and variables → Actions → New repository secret."
            echo "GITHUB_TOKEN alone often returns 401 for Maven deploy to GitHub Packages."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          overwrite-settings: false

      - name: Configure GitHub Packages credentials
        uses: ./.github/actions/configure-maven-github-packages

      - name: Verify revision is a SNAPSHOT
        id: revision
        run: |
          REV=$(mvn -B -ntp -q -DforceStdout help:evaluate -Dexpression=revision)
          echo "revision=$REV" >> "$GITHUB_OUTPUT"
          echo "Publishing revision: $REV"
          if [[ "$REV" != *-SNAPSHOT ]]; then
            echo "::error::main revision must end with -SNAPSHOT (got $REV). Use the release workflow for stable versions."
            exit 1
          fi

      - name: Build and deploy SNAPSHOT
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.PACKAGES_PUBLISH_TOKEN }}
        run: |
          echo "Deploying to https://maven.pkg.github.com/${GITHUB_REPOSITORY}"
          mvn -B -ntp clean deploy -Pgithub-packages \
            -Dgithub.repository="${GITHUB_REPOSITORY}" \
            -Dmaven.test.skip=true -Djacoco.skip=true
